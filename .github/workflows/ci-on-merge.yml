name: CI - Post Merge

on:
  push:
    branches:
      - main
      - development

jobs:
  post-merge-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Debugging - List directory contents
        run: |
          echo "Current working directory: $(pwd)"
          echo "Listing contents of the working directory:"
          ls -la

      - name: Debugging - Check PYTHONPATH and sys.path
        run: |
          export PYTHONPATH=$(pwd)/src
          python -c "import sys; print(sys.path)"
          python -c "from src.connection.local_connection import LocalConnection; print('Import successful')"

      - name: Run pytest with PYTHONPATH set
        run: |
          export PYTHONPATH=$(pwd)/src
          pytest test/unit --tb=short --maxfail=1 -v

      - name: Run ruff
        run: ruff .
